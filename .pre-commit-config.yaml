repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: mkdocs\.yml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=10000']

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.6.14
    hooks:
      - id: uv-lock

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types: [python]
        exclude: |
          (?x)(
            _expanded/seeds\.py |
            data/_expanded/ |
            tests/
          )
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-lll"]
        additional_dependencies: ["bandit[toml]"]
        exclude: |
          (?x)(
            tests/ |
            scripts/
          )

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy . --exclude tests/ --exclude scripts/ --exclude benchmarks/
        language: system
        types: [python]
        pass_filenames: false

      - id: mkdocs-build
        name: mkdocs build (strict)
        entry: uv run mkdocs build --strict
        language: system
        pass_filenames: false
        files: ^(src/reranker/|docs/|mkdocs\.yml)
