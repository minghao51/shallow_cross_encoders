site_name: shallow-cross-encoders
site_description: CPU-native reranking and consistency pipeline using static embeddings, lexical signals, and shallow models.
site_url: https://minghao.github.io/shallow_cross_encoders/
repo_url: https://github.com/minghao/shallow_cross_encoders
edit_uri: edit/main/docs/

exclude_docs: |
  2026*
  benchmarks/
  guides/
  methodology/
  plans/
  technical-roadmap.md


theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            heading_level: 2

watch:
  - src/reranker

nav:
  - Home: index.md
  - API Reference:
    - Config: api/config.md
    - Embedder: api/embedder.md
    - Lexical: api/lexical.md
    - Protocols: api/protocols.md
    - Strategies: api/strategies.md
    - Evaluation: api/eval.md
    - Data: api/data.md
    - Heuristics: api/heuristics.md
  - Notebooks: notebooks/index.md
  - About: about.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
