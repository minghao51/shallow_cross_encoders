name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'notebooks/**'
      - 'docs/**'
      - 'src/**'
      - 'mkdocs.yml'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'notebooks/**'
      - 'docs/**'
      - 'src/**'
      - 'mkdocs.yml'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install docs dependencies
        run: uv sync --extra docs

      - name: Cache notebook exports
        id: notebook-cache
        uses: actions/cache@v4
        with:
          path: docs/notebooks
          key: notebook-exports-${{ hashFiles('notebooks/*.py', 'scripts/generate_notebook_pages.py') }}

      - name: Generate notebook landing page + exports
        if: steps.notebook-cache.outputs.cache-hit != 'true'
        run: uv run scripts/generate_notebook_pages.py

      - name: Generate notebook landing page (always)
        if: steps.notebook-cache.outputs.cache-hit == 'true'
        run: uv run scripts/generate_notebook_pages.py --landing-only

      - name: Build docs
        run: uv run mkdocs build --strict

      - name: Upload artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
