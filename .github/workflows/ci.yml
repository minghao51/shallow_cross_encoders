name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy

      - name: Bandit
        run: uvx bandit -r src -c pyproject.toml -lll

      - name: Pip Audit
        run: uvx pip-audit --ignore-vuln CVE-2026-3219

      - name: Pytest
        run: uv run pytest -q --cov=src --cov-report=term-missing --cov-fail-under=85
